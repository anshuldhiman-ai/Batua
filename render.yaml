# Render Blueprint for the Batua backend (FastAPI).
# Deploy: push to GitHub, then on https://render.com click
# "New +" → "Blueprint" and select this repo. Render reads this file.
#
# After the service is live, set the secret env vars (marked sync:false)
# in the Render dashboard → your service → Environment.
services:
  - type: web
    name: batua-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # MongoDB Atlas connection string (persistent storage).
      # Without it the app falls back to SQLite, which does NOT persist
      # on Render's free tier (the disk is wiped on every restart/deploy).
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: batua
      # Comma-separated allowed origins. Set this to your deployed frontend
      # URL, e.g. https://batua.vercel.app  (NOT "*", so credentials work).
      - key: CORS_ORIGINS
        sync: false
      # Optional — Google Gemini key. Leave unset to use the rule-based parser.
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
