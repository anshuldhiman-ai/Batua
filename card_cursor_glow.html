
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .scene {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 40px 20px;
    background: #08080b;
    border-radius: 20px;
  }

  .card {
    position: relative;
    width: 290px;
    height: 370px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    cursor: none;
  }

  .card-base {
    position: absolute;
    inset: 0;
    background: #111116;
  }

  .card-glow {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    filter: blur(55px);
    left: 50%;
    top: 30%;
  }

  .card:hover .card-glow { opacity: 1; }

  .card-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px;
  }

  .card-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
  }

  .card-title {
    font-size: 22px;
    font-weight: 500;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.3;
  }

  .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.13em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 14px;
  }

  .picker-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .picker-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .swatch-wrap {
    position: relative;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }

  .swatch-wrap:hover { border-color: rgba(255,255,255,0.5); transform: scale(1.08); }

  .swatch-wrap input[type=color] {
    position: absolute;
    inset: -6px;
    width: calc(100% + 12px);
    height: calc(100% + 12px);
    border: none;
    cursor: pointer;
    opacity: 1;
    padding: 0;
  }

  .swatch-wrap input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .swatch-wrap input[type=color]::-webkit-color-swatch { border: none; }

  .hint {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
  }
</style>

<div class="scene">
  <div class="card" id="card">
    <div class="card-base"></div>
    <div class="card-glow" id="glow"></div>
    <div class="card-content">
      <div>
        <div class="card-num">01</div>
        <div class="card-title">Intelligent Automation</div>
      </div>
      <div class="card-tag">Automates tasks, saves time.</div>
    </div>
  </div>

  <div class="picker-row">
    <span class="picker-label">Glow colour</span>
    <div class="swatch-wrap" id="swatchWrap">
      <input type="color" id="colorPick" value="#ff4400">
    </div>
    <span class="hint">hover the card ↑</span>
  </div>
</div>

<script>
  const card = document.getElementById('card');
  const glow = document.getElementById('glow');
  const colorPick = document.getElementById('colorPick');
  const swatchWrap = document.getElementById('swatchWrap');

  let glowColor = '#ff4400';

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  function applyColor(hex) {
    glowColor = hex;
    const rgb = hexToRgb(hex);
    glow.style.background = `radial-gradient(circle, rgba(${rgb},0.85) 0%, rgba(${rgb},0) 70%)`;
    swatchWrap.style.boxShadow = `0 0 14px 2px rgba(${rgb},0.5)`;
  }

  applyColor(glowColor);

  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    glow.style.left = x + 'px';
    glow.style.top = y + 'px';
  });

  colorPick.addEventListener('input', function() {
    applyColor(this.value);
  });
</script>
